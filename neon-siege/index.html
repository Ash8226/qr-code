<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neon Siege</title>
<style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#08110f;color:#f4f7df;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{display:grid;place-items:center;overflow:hidden}.shell{width:min(100vw,1180px);padding:18px}.wrap{position:relative;aspect-ratio:16/9;max-height:calc(100vh - 36px);overflow:hidden;border:2px solid #28443a;background:#0a1a17;box-shadow:0 24px 70px #0008}canvas{display:block;width:100%;height:100%;image-rendering:pixelated}.hud{position:absolute;top:12px;left:12px;right:12px;display:grid;grid-template-columns:minmax(150px,1fr) repeat(3,auto) 40px;gap:10px;align-items:center;pointer-events:none}.hud>div,.hud button{min-height:40px;border:1px solid #f4f7df33;background:#08110fcc}.hud>div{display:grid;align-content:center;gap:3px;padding:6px 10px}.hud button{color:#f4f7df;font-weight:800;pointer-events:auto;cursor:pointer}.label{color:#9fb8a6;font-size:10px;font-weight:800;text-transform:uppercase}.hud strong{font-size:18px;line-height:1}.bar{height:12px;overflow:hidden;border:1px solid #f4f7df38;background:#16221d}.bar i{display:block;width:100%;height:100%;background:linear-gradient(90deg,#e84d4d,#f1b84d,#91e66e)}.message{position:absolute;inset:0;display:grid;place-content:center;gap:12px;padding:24px;text-align:center;background:radial-gradient(circle at 50% 46%,#123026bd,#040808eb 56%)}.message[hidden]{display:none}.message h1{margin:0;font-size:clamp(42px,8vw,82px);line-height:.9}.message p{max-width:560px;margin:0 auto;color:#c7d7bb;font-size:17px}.message button{justify-self:center;min-height:44px;padding:0 22px;border:0;background:#f1b84d;color:#10150f;font-weight:900;cursor:pointer}.controls{position:absolute;left:12px;right:12px;bottom:10px;display:flex;flex-wrap:wrap;gap:8px;color:#d8e6c6;font-size:12px;pointer-events:none}.controls span{padding:5px 8px;border:1px solid #f4f7df29;background:#08110fc2}.scan{position:absolute;inset:0;pointer-events:none;background:linear-gradient(#fff1 50%,#0001 50%);background-size:100% 4px;mix-blend-mode:overlay}@media(max-width:720px){body{overflow:auto}.shell{padding:8px}.hud{grid-template-columns:1fr 1fr 1fr 36px}.hud>div:first-child{grid-column:1/-1}.controls{font-size:10px}}
</style>
</head>
<body>
<main class="shell"><section class="wrap" aria-label="Neon Siege platform shooter"><canvas id="game" width="960" height="540"></canvas><div class="scan"></div><div class="hud"><div><span class="label">Health</span><div class="bar"><i id="healthBar"></i></div></div><div><span class="label">Ammo</span><strong id="ammoText">180</strong></div><div><span class="label">Grenades</span><strong id="grenadeText">4</strong></div><div><span class="label">Sector</span><strong id="sectorText">1</strong></div><button id="pauseButton" type="button" aria-label="Pause game">II</button></div><div id="message" class="message"><h1>Neon Siege</h1><p>Storm the fortified jungle platform, smash the signal core, and reach extraction.</p><button id="startButton" type="button">Start Mission</button></div><div class="controls"><span>A/D or arrows: Move</span><span>W/Space: Jump</span><span>J: Fire</span><span>K: Grenade</span><span>S: Drop</span><span>P: Pause</span></div></section></main>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),healthBar=document.getElementById('healthBar'),ammoText=document.getElementById('ammoText'),grenadeText=document.getElementById('grenadeText'),sectorText=document.getElementById('sectorText'),message=document.getElementById('message'),startButton=document.getElementById('startButton'),pauseButton=document.getElementById('pauseButton');
const W=canvas.width,H=canvas.height,world={width:4400,gravity:1450},keys=new Set(),pressed=new Set();let last=0,cameraX=0,shake=0,running=false,paused=false,won=false;
const player={x:90,y:290,w:30,h:44,vx:0,vy:0,dir:1,health:100,ammo:180,grenades:4,onGround:false,invincible:0,fireTimer:0,checkpointX:90,score:0,dropTimer:0};
const rect=(x,y,w,h)=>({x,y,w,h}),ledge=(x,y,w,h)=>({x,y,w,h,oneWay:true});
const platforms=[rect(0,486,660,54),rect(730,448,430,92),rect(1240,488,500,52),rect(1820,454,620,86),rect(2540,490,520,50),rect(3140,448,520,92),rect(3740,486,660,54),ledge(360,380,180,26),ledge(920,328,180,26),ledge(1390,370,220,26),ledge(2070,330,210,26),ledge(2820,360,210,26),ledge(3440,318,210,26),ledge(3920,382,180,26)];
const ladders=[rect(1030,328,36,120),rect(2180,330,36,124),rect(3548,318,36,130)];
const grunt=(x,y,left,right)=>({type:'grunt',x,y,w:32,h:40,vx:-70,left,right,health:36,fire:0,alive:true}),turret=(x,y)=>({type:'turret',x,y,w:42,h:42,health:70,fire:0,alive:true}),core=(x,y)=>({type:'core',x,y,w:70,h:76,health:180,fire:0,alive:true});
const pickup=(x,y,type)=>({x,y,w:26,h:26,type,taken:false,bob:Math.random()*6});let enemies=[],pickups=[],bullets=[],enemyBullets=[],grenades=[],particles=[];
function seed(){enemies=[grunt(590,438,520,680),grunt(890,400,820,1090),grunt(1460,440,1280,1680),grunt(1990,406,1880,2380),grunt(2900,442,2700,3040),grunt(3280,400,3160,3580),grunt(3900,438,3780,4200),turret(1015,292),turret(2155,294),turret(3525,282),core(4210,410)];pickups=[pickup(420,342,'ammo'),pickup(1510,332,'health'),pickup(2240,292,'grenade'),pickup(2860,322,'ammo'),pickup(3990,344,'health')];bullets=[];enemyBullets=[];grenades=[];particles=[]}
function reset(){Object.assign(player,{x:90,y:290,vx:0,vy:0,dir:1,health:100,ammo:180,grenades:4,onGround:false,invincible:0,fireTimer:0,checkpointX:90,score:0,dropTimer:0});seed();cameraX=0;shake=0;won=false;hud()}
function begin(){if(paused){paused=false;pauseButton.textContent='II';message.hidden=true;return}reset();running=true;paused=false;message.hidden=true}startButton.onclick=begin;pauseButton.onclick=()=>{if(!running)return;paused=!paused;pauseButton.textContent=paused?'>':'II';paused?show('Paused','Catch your breath, then press Resume.','Resume'):message.hidden=true};
addEventListener('keydown',e=>{if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code))e.preventDefault();if(!keys.has(e.code))pressed.add(e.code);keys.add(e.code);if(e.code==='KeyP'&&running)pauseButton.click();if((e.code==='Enter'||e.code==='NumpadEnter')&&!message.hidden)startButton.click()});addEventListener('keyup',e=>keys.delete(e.code));
function show(t,c,b){message.hidden=false;message.querySelector('h1').textContent=t;message.querySelector('p').textContent=c;startButton.textContent=b}
function update(dt){if(!running||paused||won)return;player.fireTimer=Math.max(0,player.fireTimer-dt);player.invincible=Math.max(0,player.invincible-dt);input(dt);move(dt);projectiles(dt);updateGrenades(dt);foes(dt);items(dt);parts(dt);camera(dt);hud();pressed.clear();if(player.y>H+120||player.health<=0){player.health-=player.health>0?26:0;respawn()}if(player.x>world.width-180&&enemies.find(e=>e.type==='core')?.alive===false)win()}
function input(dt){const left=keys.has('KeyA')||keys.has('ArrowLeft'),right=keys.has('KeyD')||keys.has('ArrowRight'),jump=pressed.has('KeyW')||pressed.has('ArrowUp')||pressed.has('Space'),drop=keys.has('KeyS')||keys.has('ArrowDown'),speed=player.onGround?285:242;player.vx=0;if(left){player.vx-=speed;player.dir=-1}if(right){player.vx+=speed;player.dir=1}if(jump&&player.onGround){player.vy=-560;player.onGround=false;burst(player.x+15,player.y+44,'#d8e6c6',8,90)}player.dropTimer=Math.max(0,player.dropTimer-dt);if(drop&&player.onGround){player.dropTimer=.18;player.y+=8;player.onGround=false}if((keys.has('KeyJ')||keys.has('ControlLeft'))&&player.fireTimer<=0&&player.ammo>0)fire();if(pressed.has('KeyK')&&player.grenades>0)throwGrenade();player.vy+=world.gravity*dt}
function move(dt){player.x+=player.vx*dt;for(const p of platforms)if(overlap(player,p)){if(player.vx>0)player.x=p.x-player.w;if(player.vx<0)player.x=p.x+p.w}player.y+=player.vy*dt;player.onGround=false;for(const p of platforms){if(p.oneWay&&(player.vy<0||player.dropTimer>0||player.y+player.h-player.vy*.016>p.y+8))continue;if(overlap(player,p)){if(player.vy>0){player.y=p.y-player.h;player.vy=0;player.onGround=true}else if(player.vy<0){player.y=p.y+p.h;player.vy=0}}}player.x=clamp(player.x,0,world.width-player.w);if(player.x>1180)player.checkpointX=1240;if(player.x>2500)player.checkpointX=2540;if(player.x>3740)player.checkpointX=3740}
function fire(){const up=keys.has('KeyW')||keys.has('ArrowUp'),down=keys.has('KeyS')||keys.has('ArrowDown'),vx=up||down?player.dir*360:player.dir*780,vy=up?-650:down?650:0;bullets.push({x:player.x+15+player.dir*18,y:player.y+18,vx,vy,r:5,life:.82,damage:18});player.ammo--;player.fireTimer=.09;shake=Math.max(shake,2)}
function throwGrenade(){grenades.push({x:player.x+15,y:player.y+15,vx:player.dir*420,vy:-420,r:7,life:1.1});player.grenades--}
function projectiles(dt){step(bullets,dt,true);step(enemyBullets,dt,false)}function step(list,dt,owned){for(let i=list.length-1;i>=0;i--){const b=list[i];b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;if(b.life<=0||b.x<cameraX-120||b.x>cameraX+W+140||b.y<-60||b.y>H+60||platforms.some(p=>circleRect(b,p))){list.splice(i,1);continue}if(owned){for(const e of enemies)if(e.alive&&circleRect(b,e)){damage(e,b.damage);burst(b.x,b.y,'#f1b84d',7,130);list.splice(i,1);break}}else if(player.invincible<=0&&circleRect(b,player)){hurt(13);burst(b.x,b.y,'#e84d4d',8,120);list.splice(i,1)}}}
function updateGrenades(dt){for(let i=grenades.length-1;i>=0;i--){const g=grenades[i];g.vy+=world.gravity*dt;g.x+=g.vx*dt;g.y+=g.vy*dt;g.life-=dt;for(const p of platforms)if(circleRect(g,p)&&g.vy>0){g.y=p.y-g.r;g.vy*=-.42;g.vx*=.75}if(g.life<=0){explode(g.x,g.y);grenades.splice(i,1)}}}
function foes(dt){for(const e of enemies){if(!e.alive)continue;e.fire-=dt;if(e.type==='grunt'){e.x+=e.vx*dt;if(e.x<e.left||e.x>e.right)e.vx*=-1;if(Math.abs(player.x-e.x)<520&&Math.abs(player.y-e.y)<120&&e.fire<=0){shoot(e,430);e.fire=1.25+Math.random()*.5}if(player.invincible<=0&&overlap(player,e))hurt(18)}if(e.type==='turret'&&Math.abs(player.x-e.x)<660&&e.fire<=0){shoot(e,520);e.fire=.92}if(e.type==='core'&&Math.abs(player.x-e.x)<760&&e.fire<=0){radial(e);e.fire=1.65}}}
function shoot(e,speed){const cx=e.x+e.w/2,cy=e.y+e.h/2,a=Math.atan2(player.y+18-cy,player.x+14-cx);enemyBullets.push({x:cx,y:cy,vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,r:5,life:1.7})}function radial(e){const cx=e.x+35,cy=e.y+38;for(let i=0;i<7;i++){const a=-Math.PI+i*(Math.PI/6);enemyBullets.push({x:cx,y:cy,vx:Math.cos(a)*380,vy:Math.sin(a)*380,r:5,life:1.6})}}
function damage(e,n){e.health-=n;shake=Math.max(shake,e.type==='core'?5:2);if(e.health<=0){e.alive=false;player.score+=e.type==='core'?1000:120;burst(e.x+e.w/2,e.y+e.h/2,e.type==='core'?'#8de0ff':'#f1b84d',e.type==='core'?46:20,270);shake=Math.max(shake,e.type==='core'?18:7)}}function explode(x,y){burst(x,y,'#f1b84d',36,300);burst(x,y,'#e84d4d',28,230);shake=Math.max(shake,14);for(const e of enemies)if(e.alive&&dist(x,y,e.x+e.w/2,e.y+e.h/2)<150)damage(e,58)}
function items(dt){for(const p of pickups){if(p.taken)continue;p.bob+=dt*5;if(overlap(player,p)){p.taken=true;if(p.type==='ammo')player.ammo+=70;if(p.type==='health')player.health=Math.min(100,player.health+34);if(p.type==='grenade')player.grenades+=2;burst(p.x+13,p.y+13,'#91e66e',16,160)}}}function parts(dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=360*dt;p.life-=dt;if(p.life<=0)particles.splice(i,1)}}function camera(dt){const t=clamp(player.x-W*.38,0,world.width-W);cameraX+=(t-cameraX)*Math.min(1,dt*7);shake=Math.max(0,shake-dt*28)}function hud(){healthBar.style.width=clamp(player.health,0,100)+'%';ammoText.textContent=player.ammo;grenadeText.textContent=player.grenades;sectorText.textContent=Math.min(4,Math.floor(player.x/1100)+1)}
function respawn(){if(player.health<=0){running=false;show('Mission Failed','The signal base held this time. Re-arm and push the line again.','Retry Mission');return}player.x=player.checkpointX;player.y=260;player.vx=0;player.vy=0;player.invincible=1.7;burst(player.x,player.y,'#8de0ff',24,210)}function hurt(n){player.health-=n;player.invincible=1;player.vx=-player.dir*180;player.vy=-190;shake=Math.max(shake,9)}function win(){won=true;running=false;show('Extraction Clear','Signal core destroyed. Score '+player.score+'.','Run It Back')}
function draw(){ctx.clearRect(0,0,W,H);const ox=shake?(Math.random()-.5)*shake:0,oy=shake?(Math.random()-.5)*shake:0;ctx.save();ctx.translate(-Math.floor(cameraX)+ox,oy);bg();worldDraw();drawPickups();drawEnemies();drawPlayer();drawShots();drawParts();ctx.restore()}function bg(){const g=ctx.createLinearGradient(cameraX,0,cameraX,H);g.addColorStop(0,'#12302f');g.addColorStop(.55,'#16291f');g.addColorStop(1,'#08110f');ctx.fillStyle=g;ctx.fillRect(cameraX,0,W,H);hill('#1f4a3d',.18,90,340,160);hill('#2b5f49',.32,170,410,120);ctx.fillStyle='#0f1c18';for(let x=-200;x<world.width+200;x+=180){const px=x+(cameraX*.18)%180;ctx.fillRect(px,168,18,318);ctx.fillRect(px-34,230,88,10)}}function hill(color,speed,base,step,amp){ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(cameraX-80,H);for(let x=cameraX-80;x<cameraX+W+160;x+=80)ctx.lineTo(x,base+Math.sin((x+cameraX*speed)/step)*amp*.18);ctx.lineTo(cameraX+W+160,H);ctx.closePath();ctx.fill()}
function worldDraw(){for(const p of platforms){ctx.fillStyle='#314236';ctx.fillRect(p.x,p.y,p.w,p.h);ctx.fillStyle='#6d7f55';ctx.fillRect(p.x,p.y,p.w,8);ctx.fillStyle='#0004';for(let x=p.x+20;x<p.x+p.w;x+=52)ctx.fillRect(x,p.y+10,20,p.h-14)}for(const l of ladders){ctx.strokeStyle='#bf9860';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(l.x+6,l.y);ctx.lineTo(l.x+6,l.y+l.h);ctx.moveTo(l.x+l.w-6,l.y);ctx.lineTo(l.x+l.w-6,l.y+l.h);for(let y=l.y+12;y<l.y+l.h;y+=18){ctx.moveTo(l.x+5,y);ctx.lineTo(l.x+l.w-5,y)}ctx.stroke()}ctx.fillStyle='#8de0ff';ctx.fillRect(world.width-110,424,64,62);ctx.fillStyle='#f4f7df';ctx.fillRect(world.width-102,434,48,10)}
function drawPlayer(){if(player.invincible>0&&Math.floor(player.invincible*18)%2===0)return;const x=player.x,y=player.y;ctx.fillStyle='#77d06a';ctx.fillRect(x+7,y+13,18,22);ctx.fillStyle='#f1d4a7';ctx.fillRect(x+8,y,16,15);ctx.fillStyle='#e84d4d';ctx.fillRect(x+4,y+12,22,7);ctx.fillStyle='#1f2b25';ctx.fillRect(x+5,y+35,8,9);ctx.fillRect(x+18,y+35,8,9);ctx.fillStyle='#d8e6c6';ctx.fillRect(x+(player.dir>0?24:-12),y+18,18,6);ctx.fillStyle='#10150f';ctx.fillRect(x+(player.dir>0?18:7),y+5,5,3)}
function drawEnemies(){for(const e of enemies){if(!e.alive)continue;if(e.type==='grunt'){ctx.fillStyle='#b64c4c';ctx.fillRect(e.x+6,e.y+10,20,24);ctx.fillStyle='#c78f56';ctx.fillRect(e.x+8,e.y,16,13);ctx.fillStyle='#1b2420';ctx.fillRect(e.x+4,e.y+34,8,6);ctx.fillRect(e.x+20,e.y+34,8,6)}else if(e.type==='turret'){ctx.fillStyle='#5e7180';ctx.fillRect(e.x,e.y+12,e.w,30);ctx.fillStyle='#e84d4d';ctx.fillRect(e.x+6,e.y+5,30,18);ctx.fillStyle='#10150f';ctx.fillRect(e.x+16,e.y+10,10,8)}else{ctx.fillStyle='#24343e';ctx.fillRect(e.x,e.y,e.w,e.h);ctx.fillStyle='#8de0ff';ctx.fillRect(e.x+14,e.y+14,e.w-28,e.h-28);ctx.fillStyle='#e84d4dbf';ctx.fillRect(e.x+22,e.y+24,e.w-44,e.h-48)}}}
function drawPickups(){for(const p of pickups){if(p.taken)continue;const y=p.y+Math.sin(p.bob)*5;ctx.fillStyle=p.type==='health'?'#91e66e':p.type==='grenade'?'#f1b84d':'#8de0ff';ctx.fillRect(p.x,y,p.w,p.h);ctx.fillStyle='#10150f';ctx.fillRect(p.x+8,y+8,10,10)}}function drawShots(){ctx.fillStyle='#f4f7df';for(const b of bullets){ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill()}ctx.fillStyle='#e84d4d';for(const b of enemyBullets){ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill()}ctx.fillStyle='#f1b84d';for(const g of grenades){ctx.beginPath();ctx.arc(g.x,g.y,g.r,0,Math.PI*2);ctx.fill()}}function drawParts(){for(const p of particles){ctx.globalAlpha=Math.max(0,p.life/p.max);ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y,p.size,p.size);ctx.globalAlpha=1}}
function burst(x,y,color,count,speed){for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,s=Math.random()*speed,life=.35+Math.random()*.45;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,size:2+Math.random()*4,color,life,max:life})}}function overlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}function circleRect(c,r){const cx=clamp(c.x,r.x,r.x+r.w),cy=clamp(c.y,r.y,r.y+r.h);return dist(c.x,c.y,cx,cy)<c.r}function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by)}function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function loop(t){const dt=Math.min(.033,(t-last)/1000||0);last=t;update(dt);draw();requestAnimationFrame(loop)}reset();draw();requestAnimationFrame(loop);
</script>
</body>
</html>
